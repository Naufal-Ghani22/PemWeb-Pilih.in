<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style-login1.css">
</head>
<body>
    <div class="wrapper">
        <form id="loginForm">
        <h1><b>Login</b></h1>
    
    <div class="input-box">
        <input type="text" id="username" placeholder="Username" required>
        <i class='bx bxs-user'></i>
    </div>

    <div class="input-box">
        <input type="password" placeholder="Password" required>
        <i class='bx bxs-lock'></i>
    </div>

    <div class="remember-forgot">
        <label> <input type="checkbox"> Remember me</label>
        <a href="#">Lupa password?</a>
    </div>
    
    <button type="submit" class="btn">Login</button>

    <div class="register-link">
        <p>Belum punya akun? <a href="register.html">Register</a></p>
    </div>
    </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
    event.preventDefault();
    
    // Ambil nama dari input (opsional, agar dashboard bisa menyapa namamu)
    const inputUsername = document.getElementById('username').value;

    // "Titipkan" data ke browser (tanpa database)
    const userDummy = { 
        nama: inputUsername, 
        role: "Admin" 
    };
    sessionStorage.setItem('currentUser', JSON.stringify(userDummy));

    // Pindah ke dashboard
    window.location.href = 'rangkuman.html'; 
});
    </script>
</body>
</html>
